
services:
  aegisvault:
    build: .
    image: aegisvault:latest
    container_name: aegisvault
    restart: unless-stopped
    # Run in headless mode (no system tray UI in container)
    command: ["--no-tray"]
    environment:
      - AEGISVAULT_PATHS__INBOX=/app/AegisVault/Inbox
      - AEGISVAULT_PATHS__VAULT=/app/AegisVault/Vault
      - AEGISVAULT_PATHS__INDEX=/app/AegisVault/Index
    volumes:
      # Mount persistent data matching default app paths
      - ./data/inbox:/app/AegisVault/Inbox
      - ./data/vault:/app/AegisVault/Vault
      - ./data/index:/app/AegisVault/Index
      - ./data/config:/app/AegisVault/Config
    stdin_open: true
    tty: true
